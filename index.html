<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Satyabati Hindu Hotel</title>

<style>
body { margin:0; font-family:Arial; background:#fff; }

/* Header */
.header {
  position: sticky;
  top:0;
  background:#fff;
  padding:12px;
  text-align:center;
  font-weight:bold;
  border-bottom:1px solid #eee;
}

/* Grid */
#products {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

/* Card */
.card {
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.content { padding:8px; }

.price { font-weight:bold; }

/* Quantity */
.qty {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:5px;
}

.qty button {
  padding:5px 10px;
  background:#ddd;
  border:none;
  cursor:pointer;
}

/* Order button */
.order {
  width:100%;
  background:#FFC107;
  border:none;
  padding:8px;
  cursor:pointer;
}

/* Cart button */
.cart-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🍽️ Satyabati Hindu Hotel</div>

<div id="products"></div>

<div class="cart-btn" onclick="openCart()">🛒</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1ha14_n8IdltiVwrMFYSC5e8l5fnMkJUQkxHqd1KzpcQ/gviz/tq?tqx=out:json";

let products = [];
let cart = {};

fetch(sheetURL)
.then(res => res.text())
.then(data => {
  const json = JSON.parse(data.substr(47).slice(0,-2));
  const rows = json.table.rows;

  rows.forEach(r => {
    const p = {
      id: r.c[1]?.v,
      name: r.c[4]?.v,
      price: r.c[5]?.v,
      img: r.c[6]?.v,
      msg: r.c[8]?.v,
      show: r.c[11]?.v
    };

    if(p.name && p.show==="Yes") products.push(p);
  });

  displayProducts();
});

function displayProducts(){
  let html="";
  products.forEach((p,i)=>{
    html+=`
    <div class="card">
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'">
      <div class="content">
        <h4>${p.name}</h4>
        <div class="price">₹${p.price}</div>

        <div class="qty">
          <button onclick="changeQty('${p.id}',-1)">-</button>
          <span id="qty-${p.id}">0</span>
          <button onclick="changeQty('${p.id}',1)">+</button>
        </div>

        <button class="order" onclick="addToCart('${p.id}')">Add</button>
      </div>
    </div>
    `;
  });

  document.getElementById("products").innerHTML=html;
}

function changeQty(id,val){
  let q = cart[id]?.qty || 0;
  q += val;
  if(q<0) q=0;

  if(!cart[id]) cart[id]={qty:0};
  cart[id].qty=q;

  document.getElementById("qty-"+id).innerText=q;
}

function addToCart(id){
  const p = products.find(x=>x.id===id);
  if(!cart[id] || cart[id].qty===0){
    alert("Select quantity first");
    return;
  }
  cart[id].name=p.name;
  cart[id].price=p.price;
}

function openCart(){
  let text="Order:\n";
  let total=0;

  for(let id in cart){
    let item=cart[id];
    if(item.qty>0){
      let t=item.qty*item.price;
      total+=t;
      text+=`${item.name} x ${item.qty} = ₹${t}\n`;
    }
  }

  text+=`\nTotal = ₹${total}`;

  window.open(`https://wa.me/919836697502?text=${encodeURIComponent(text)}`);
}
</script>

</body>
</html>
