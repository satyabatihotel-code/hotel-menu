<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Satyabati Hindu Hotel</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  background: #ffffff;
  padding: 10px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  border-bottom: 1px solid #eee;
  z-index: 1000;
}

/* Home button */
.home-btn {
  display: block;
  text-align: center;
  background: black;
  color: white;
  padding: 8px;
  text-decoration: none;
  font-weight: bold;
}

/* Filters */
.filters {
  display: flex;
  overflow-x: auto;
  gap: 8px;
  padding: 10px;
}

.filters button {
  padding: 6px 12px;
  border: none;
  border-radius: 20px;
  background: #eee;
  cursor: pointer;
}

/* Veg filter */
.veg-filter {
  text-align: center;
  padding: 5px;
}

.veg-filter button {
  margin: 3px;
  padding: 6px 12px;
  border: none;
  border-radius: 20px;
  background: #eee;
  cursor: pointer;
}

/* Grid */
#products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 12px;
}

/* Card FIXED HEIGHT */
.card {
  display: flex;
  flex-direction: column;
  border-radius: 14px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* Image */
.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

/* Content FLEX */
.content {
  flex: 1;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.content h3 {
  font-size: 14px;
  margin: 5px 0;
}

.desc {
  font-size: 12px;
  color: #666;
  flex-grow: 1;
}

/* Price */
.price {
  font-weight: bold;
  margin-top: 5px;
}

/* Button */
button.order {
  width: 100%;
  padding: 10px;
  border: none;
  background: #FFC107;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<a class="home-btn" href="https://sites.google.com/view/satyabati/home">🏠 Home</a>

<div class="header">🍽️ Satyabati Hindu Hotel</div>

<div class="filters" id="filters"></div>

<div class="veg-filter">
  <button onclick="filterVeg('All')">All</button>
  <button onclick="filterVeg('Veg')">Veg</button>
  <button onclick="filterVeg('Egg')">Egg</button>
  <button onclick="filterVeg('Fish')">Fish</button>
  <button onclick="filterVeg('Meat')">Meat</button>
  <button onclick="filterVeg('Today Special')">Today Special</button>
</div>

<div id="products"></div>

<a class="home-btn" href="https://sites.google.com/view/satyabati/home">🏠 Home</a>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1ha14_n8IdltiVwrMFYSC5e8l5fnMkJUQkxHqd1KzpcQ/gviz/tq?tqx=out:json";

let allProducts = [];
let currentCategory = "All";
let currentVeg = "All";

fetch(sheetURL)
.then(res => res.text())
.then(data => {
  const json = JSON.parse(data.substr(47).slice(0, -2));
  const rows = json.table.rows;

  rows.forEach(r => {
    const item = {
      category: r.c[2]?.v,
      subcategory: r.c[3]?.v,
      name: r.c[4]?.v,
      price: r.c[5]?.v,
      img: r.c[6]?.v,
      desc: r.c[7]?.v,
      msg: r.c[8]?.v,
      show: r.c[11]?.v,
      priority: r.c[14]?.v
    };

    // FIXED: show condition
    if (item.name && (item.show === "Yes" || item.show === "yes" || item.show === true)) {
      allProducts.push(item);
    }
  });

  allProducts.sort((a, b) => (a.priority || 999) - (b.priority || 999));

  createFilters();
  displayProducts(allProducts);
});

function createFilters() {
  const categories = [...new Set(allProducts.map(p => p.category))];

  let html = `<button onclick="filterCategory('All')">All</button>`;

  categories.forEach(cat => {
    html += `<button onclick="filterCategory('${cat}')">${cat}</button>`;
  });

  document.getElementById("filters").innerHTML = html;
}

function filterCategory(cat) {
  currentCategory = cat;
  applyFilters();
}

function filterVeg(type) {
  currentVeg = type;
  applyFilters();
}

function applyFilters() {
  let filtered = allProducts;

  if (currentCategory !== "All") {
    filtered = filtered.filter(p => p.category === currentCategory);
  }

  if (currentVeg !== "All") {
    filtered = filtered.filter(p => p.subcategory === currentVeg);
  }

  displayProducts(filtered);
}

function displayProducts(list) {
  let html = "";

  list.forEach(p => {
    html += `
    <div class="card">
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'">
      <div class="content">
        <h3>${p.name}</h3>
        <p class="desc">${p.desc}</p>
        <p class="price">₹${p.price}</p>
      </div>
      <button class="order" onclick="order('${p.msg}')">Order</button>
    </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

function order(msg) {
  const phone = "919836697502";
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
