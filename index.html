<!DOCTYPE html>
<html>
<head>
  <title>Hotel Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <style>
    body {
      font-family: Arial;
      padding: 10px;
      background: #f5f5f5;
    }

    h2 {
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
      margin: 10px;
      width: 45%;
      display: inline-block;
      vertical-align: top;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    h3 {
      margin: 5px 0;
    }

    p {
      margin: 5px 0;
      color: #555;
    }

    .price {
      font-weight: bold;
      font-size: 18px;
      color: green;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      margin-top: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>🍽️ Hotel Menu</h2>
<div id="products"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1ha14_n8IdltiVwrMFYSC5e8l5fnMkJUQkxHqd1KzpcQ/gviz/tq?tqx=out:json";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const json = JSON.parse(data.substr(47).slice(0, -2));
    const rows = json.table.rows;

    let html = "";

    rows.forEach(r => {
      const name = r.c[4]?.v;
      const price = r.c[5]?.v;
      const img = r.c[6]?.v;
      const desc = r.c[7]?.v;
      const msg = r.c[8]?.v;
      const show = r.c[11]?.v;

      if (!name || show !== "Yes") return;

      html += `
        <div class="card">
          <img src="${img}">
          <h3>${name}</h3>
          <p>${desc}</p>
          <p class="price">₹${price}</p>
          <button onclick="order('${msg}')">Order on WhatsApp</button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;
  });

function order(msg) {
  const phone = "919836697502";
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
